<style>
  :root{--blue:#122B8F;--blue-deep:#0A1E6E;--gold:#F5C518;--ink:#050817}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}

    background:linear-gradient(160deg,var(--blue) 0%,var(--blue-deep) 100%);
    color:#fff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;

  .wrap{max-width:520px}
  .code{font-size:clamp(72px,18vw,140px);font-weight:900;line-height:1;

  p{opacity:.8;font-size:16px;line-height:1.5;margin-bottom:28px}
  a{display:inline-block;background:var(--gold);color:var(--ink);
    text-decoration:none;font-weight:700;padding:14px 28px;border-radius:999px;
    transition:transform .2s ease,opacity .2s ease}
